workflows:
  main:
    name: Main
    max_build_duration: 120
    instance_type: mac_mini_m4
    triggering:
      events:
      - push
      branch_patterns:
        - pattern: 'main'        
    scripts:
        - name: Message 
          script: |
            echo "Hello from the main workflow!"
  staging:
    name:  staging
    max_build_duration: 120
    instance_type: mac_mini_m4
  
    triggering:
      events:
      - pull_request
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true 
    scripts:
        - name: Message
          script: |
            echo "Hello from the Staging workflow!"
